spring.application.name=placify-backend
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/placify_db?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root@123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
server.port=${PORT:8080}

# JWT Configuration
app.jwt.secret=${APP_JWTSECRET:placifySecretKeyForJWTTokenGenerationAndValidation2024}
app.jwt.expiration=${APP_JWTEXPIRATIONMS:86400000}

# File upload settings
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.file.upload-dir=uploads

# SendGrid Configuration
sendgrid.api.key=${SENDGRID_API_KEY:your-api-key-here}
sendgrid.from.email=${SENDGRID_FROM_EMAIL:noreply@placify.com}
sendgrid.from.name=${SENDGRID_FROM_NAME:Placify}

# Application URL (for reset link)
app.frontend.url=${APP_FRONTEND_URL:http://localhost:5173}

# Google OAuth Configuration
google.oauth.client-id=${GOOGLE_CLIENT_ID:your-google-client-id}
google.oauth.client-secret=${GOOGLE_CLIENT_SECRET:your-google-client-secret}
google.oauth.redirect-uri=${GOOGLE_REDIRECT_URI:https://placify-backend-production.up.railway.app/api/email/oauth/callback}
google.oauth.scope=https://www.googleapis.com/auth/gmail.readonly

# Microsoft OAuth Configuration (placeholder - add when you have Azure AD app)
microsoft.oauth.client-id=${MICROSOFT_CLIENT_ID:skip}
microsoft.oauth.client-secret=${MICROSOFT_CLIENT_SECRET:skip}
microsoft.oauth.redirect-uri=${MICROSOFT_REDIRECT_URI:https://placify-backend-production.up.railway.app/api/email/oauth/callback}
microsoft.oauth.scope=Mail.Read offline_access

# Email Token Encryption (any string will be hashed to proper size)
email.token.encryption.key=${EMAIL_ENCRYPTION_KEY:your-encryption-key}

# Email Sync Configuration
email.sync.enabled=true
email.sync.interval=900000
email.sync.max-messages=100
